<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板塊構造論 - 語音互動教學</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ecf0f1; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 700px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* 介紹頁面樣式 */
        #intro-section { line-height: 1.6; }
        .highlight-box { background: #fdf2e9; border-left: 5px solid var(--accent); padding: 15px; margin: 15px 0; }
        
        /* 挑戰頁面樣式 */
        #quiz-section { display: none; text-align: center; }
        .countdown { font-size: 3rem; color: var(--accent); font-weight: bold; height: 80px; }
        .question-display { font-size: 1.4rem; margin: 20px 0; padding: 20px; background: #f9f9f9; border-radius: 10px; }
        .blank { border-bottom: 3px solid var(--primary); color: var(--accent); padding: 0 10px; min-width: 80px; display: inline-block; }
        
        #status-indicator { font-size: 0.9rem; color: #7f8c8d; margin-top: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-size: 1.1rem; margin-top: 20px; }
        .btn:hover { opacity: 0.9; }
        .feedback { margin-top: 20px; font-weight: bold; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div id="intro-section">
        <h1 style="color:var(--primary)">🌎 板塊構造論教學</h1>
        <p>板塊構造論認為地球的岩石圈是由多個<b>板塊</b>拼合而成，並在<b>軟流圈</b>上移動。</p>
        <div class="highlight-box">
            <b>三大邊界類型：</b><br>
            1. <b>聚合性</b>：板塊擠壓（如海溝、山脈）。<br>
            2. <b>張裂性</b>：板塊分離（如中洋脊）。<br>
            3. <b>錯動性</b>：板塊水平摩擦。
        </div>
        <p>準備好進行語音測驗了嗎？請確保麥克風已開啟。</p>
        <button class="btn" onclick="startChallengeMode()">開始語音挑戰</button>
    </div>

    <div id="quiz-section">
        <h2 id="cat-title">知識問答</h2>
        <div class="countdown" id="timer"></div>
        <div class="question-display" id="q-text"></div>
        <div id="status-indicator">等待指令...</div>
        <div id="feedback-text" class="feedback"></div>
    </div>
</div>

<script>
// 1. 題目數據庫
const quizData = [
    { q: "地球的最外層是由____拼合而成的。", a: "板塊", d: "沒錯！岩石圈由大大小小的板塊組成，就像拼圖一樣。" },
    { q: "板塊是在哪一層構造之上進行移動的？答案是____。", a: "軟流圈", d: "正確。軟流圈具有塑性，讓上方的板塊可以滑動。" },
    { q: "當板塊互相擠壓，這種邊界稱為____板塊邊界。", a: "聚合", d: "正確。聚合性邊界常會產生海溝和高大的山脈。" },
    { q: "兩板塊分離，形成新地殼的邊界稱為____性邊界。", a: "張裂", d: "對了。例如中洋脊就是典型的張裂性板塊邊界。" },
    { q: "板塊移動的主因是地函的____現象。", a: "對流", d: "非常棒。地函橫向密度變化產生的對流是板塊運動的動力源。" }
];

let currentIndex = 0;
const synth = window.speechSynthesis;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = 'zh-HK'; // 設定為粵語，國語請改 zh-TW
recognition.interimResults = false;

// 2. 切換到挑戰模式
function startChallengeMode() {
    $('#intro-section').hide();
    $('#quiz-section').fadeIn();
    loadQuestion();
}

// 3. 載入題目
function loadQuestion() {
    if (currentIndex >= quizData.length) {
        $('#q-text').html("🎉 恭喜完成所有課程！");
        speak("恭喜你，已經掌握了板塊構造論的基本知識。");
        return;
    }
    
    let item = quizData[currentIndex];
    let displayQ = item.q.replace("____", "<span class='blank'>？</span>");
    $('#q-text').html(displayQ);
    $('#feedback-text').text("");
    
    // 朗讀題目
    speak(item.q.replace("____", "什麼"), function() {
        startCountdown();
    });
}

// 4. 倒數 3, 2, 1 邏輯
function startCountdown() {
    let count = 3;
    $('#timer').text(count);
    
    const interval = setInterval(() => {
        count--;
        if (count > 0) {
            $('#timer').text(count);
            // 可以選擇加入倒數聲效
        } else {
            clearInterval(interval);
            $('#timer').text("請說話...");
            startListening();
        }
    }, 1000);
}

// 5. 語音辨識
function startListening() {
    $('#status-indicator').text("🎤 麥克風已開啟...");
    recognition.start();
}

recognition.onresult = function(event) {
    const userAnswer = event.results[0][0].transcript;
    const item = quizData[currentIndex];
    
    $('#status-indicator').text("辨識內容：" + userAnswer);
    
    if (userAnswer.includes(item.a)) {
        // 答對了
        $('#feedback-text').html(`<span style="color:var(--success)">✅ 答對了！</span>`);
        $('#timer').text("👍");
        speak(item.d, function() {
            currentIndex++;
            setTimeout(loadQuestion, 1000);
        });
    } else {
        // 答錯了
        $('#feedback-text').html(`<span style="color:#e74c3c">❌ 聽起來不太像... 再試一次</span>`);
        retryFlow();
    }
};

// 6. 錯誤處理與自動重錄
recognition.onerror = function() {
    $('#status-indicator').text("未檢測到聲音。");
    retryFlow();
};

function retryFlow() {
    recognition.stop();
    setTimeout(() => {
        $('#status-indicator').text("1.5 秒後重新錄音...");
        setTimeout(startCountdown, 1500); // 1.5秒後重啟倒數
    }, 100);
}

// 語音播放輔助函數
function speak(text, callback) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-HK'; 
    utter.rate = 1.1; // 稍微快一點比較生動
    utter.onend = callback;
    synth.speak(utter);
}
</script>

</body>
</html>
