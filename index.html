<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動語音學習 App</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: '微軟正黑體', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #2c3e50; font-size: 1.5rem; }
        #question-box { margin: 20px 0; min-height: 80px; font-size: 1.2rem; color: #34495e; font-weight: bold; }
        #status { color: #e74c3c; font-weight: bold; margin-bottom: 10px; height: 24px; }
        #result { margin-top: 15px; font-size: 1.1rem; min-height: 30px; }
        .btn { background: #3498db; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }
    </style>
</head>
<body>

<div class="card">
    <h1>🌍 知識問答大挑戰</h1>
    <div id="status">準備就緒</div>
    <div id="question-box">點擊下方按鈕開始學習</div>
    <div id="result"></div>
    <button id="start-btn" class="btn">開始回答</button>
</div>

<script>
$(document).ready(function() {
    // 1. 定義問題與答案數據
    const quizData = [
        { cat: "地理", q: "世界上最長的河流是哪一條？", a: "尼羅河" },
        { cat: "藝術", q: "經典畫作《蒙娜麗莎》是由誰繪製的？", a: "達芬奇" },
        { cat: "科技", q: "韓國最大的科技公司是哪一家？", a: "三星" },
        { cat: "科學", q: "水的化學符號是什麼？", a: "H2O" },
        { cat: "人體", q: "人體最大的器官是什麼？", a: "皮膚" },
        { cat: "時間", q: "一年（非閏年）共有多少天？", a: "365" },
        { cat: "生活", q: "由冰塊蓋成的房子稱為什麼？", a: "雪屋" },
        { cat: "數學", q: "64 的平方根是多少？", a: "8" },
        { cat: "腦筋急轉彎", q: "哪一個月有 28 天？", a: "每個月" }
    ];

    let currentIndex = 0;

    // 2. 初始化語音合成 (TTS) 與 語音識別 (STT)
    const synth = window.speechSynthesis;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();

    recognition.lang = 'zh-HK'; // 可改為 'zh-CN' 或 'zh-TW'
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    // 3. 播放語音函數
    function speak(text, callback) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-HK';
        utter.onend = callback;
        synth.speak(utter);
    }

    // 4. 開始流程
    $('#start-btn').click(function() {
        startQuiz();
    });

    function startQuiz() {
        if (currentIndex >= quizData.length) {
            $('#question-box').text("恭喜！你已完成所有題目！");
            speak("恭喜！你已完成所有題目！");
            currentIndex = 0;
            return;
        }

        let currentQ = quizData[currentIndex];
        $('#question-box').text(`[${currentQ.cat}] ${currentQ.q}`);
        $('#result').text("");
        $('#start-btn').prop('disabled', true);
        
        // 先讀出問題，讀完後啟動麥克風
        speak(currentQ.q, function() {
            startListening();
        });
    }

    // 5. 啟動麥克風聽取回答
    function startListening() {
        $('#status').text("正在聽取你的回答...");
        recognition.start();
    }

    // 6. 語音識別結果處理
    recognition.onresult = function(event) {
        const userAnswer = event.results[0][0].transcript;
        const correctAnswer = quizData[currentIndex].a;
        
        $('#status').text("分析中...");
        
        // 簡單的比對邏輯 (判斷是否包含關鍵字)
        if (userAnswer.includes(correctAnswer) || (correctAnswer === "H2O" && userAnswer.toLowerCase().includes("h2o"))) {
            $('#result').html(`<span class="correct">正確！你說的是：${userAnswer}</span>`);
            speak("答對了，太棒了！", function() {
                currentIndex++;
                setTimeout(startQuiz, 1000);
            });
        } else {
            $('#result').html(`<span class="wrong">可惜！你說的是：${userAnswer}，正確答案是：${correctAnswer}</span>`);
            speak("不太正確喔，再試試看吧。", function() {
                $('#start-btn').prop('disabled', false).text("重試這一題");
            });
        }
    };

    recognition.onspeechend = function() {
        recognition.stop();
        $('#status').text("準備就緒");
    };

    recognition.onerror = function(event) {
        $('#status').text("錯誤: " + event.error);
        $('#start-btn').prop('disabled', false);
    };
});
</script>

</body>
</html>
