<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常識科溫習大挑戰</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { 
            --primary: #3498db; 
            --accent: #f1c40f; 
            --danger: #e74c3c; 
            --success: #2ecc71; 
            --bg: #f0f3f5;
        }

        /* 全域置中排版 */
        body, html { 
            height: 100%; margin: 0; 
            font-family: '微軟正黑體', sans-serif; 
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .main-container {
            width: 90%; max-width: 650px;
            background: white; padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        /* 首頁（溫習版面）設計 */
        #intro-page h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 1.1rem; }
        
        .word-bank-container {
            background: #f9f9f9; padding: 25px;
            border-radius: 20px; border: 2px dashed #ddd;
            margin-bottom: 35px;
        }
        .word-bank-title { font-weight: bold; color: #34495e; margin-bottom: 15px; display: block; }
        .word-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .word-item { 
            background: white; border: 1px solid #eee; padding: 10px;
            border-radius: 10px; color: #2c3e50; font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 按鈕設計 */
        .btn-start {
            background: var(--primary); color: white;
            border: none; padding: 18px 60px;
            border-radius: 50px; font-size: 1.4rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(52, 152, 219, 0.4); }

        /* 答題頁面設計 */
        #quiz-page { display: none; }
        #main-status { font-size: 1.8rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; min-height: 40px; }
        #timer-display { font-size: 5rem; color: var(--accent); font-weight: 900; height: 120px; }
        #question-text { font-size: 1.6rem; line-height: 1.6; color: #2c3e50; margin: 20px 0; }
        .blank-space { color: var(--primary); border-bottom: 3px solid var(--primary); padding: 0 10px; font-weight: bold; }

        /* 錯誤 Overlay */
        #error-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(231, 76, 60, 0.96); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        #error-overlay h2 { font-size: 4rem; margin: 0; }
        #error-overlay p { font-size: 2rem; margin-top: 20px; font-weight: 300; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="intro-page">
            <h1>常識科溫習卡</h1>
            <div class="subtitle">單元：多元技能評估 (填充題)</div>
            
            <div class="word-bank-container">
                <span class="word-bank-title">🔍 本課重點詞彙：</span>
                <div class="word-grid">
                    <div class="word-item">生活</div><div class="word-item">特色</div><div class="word-item">友好</div>
                    <div class="word-item">探究</div><div class="word-item">熱身</div><div class="word-item">愛護</div>
                    <div class="word-item">武器</div><div class="word-item">樹皮</div><div class="word-item">安全</div>
                    <div class="word-item">鋸子</div>
                </div>
            </div>
            
            <button id="start-node" class="btn-start">開始語音挑戰</button>
        </div>

        <div id="quiz-page">
            <div id="main-status">準備中</div>
            <div id="timer-display"></div>
            <div id="question-text">載入中...</div>
            <div id="live-hint" style="font-size: 0.9rem; color: #bdc3c7;"></div>
        </div>
    </div>

    <div id="error-overlay">
        <h2>❌ 答錯了</h2>
        <p id="retry-timer-text">請準備，3 秒後重新補答</p>
    </div>

<script>
$(document).ready(function() {
    const quizData = [
        { q: "不同的服務人員為我們提供不同的服務，為____帶來方便。", a: "生活", d: "沒錯！服務人員讓生活更便利。" },
        { q: "香港的社區有不同的____，例如：到沙田城門河踏單車。", a: "特色", d: "正確！每個社區都有自己的特色。" },
        { q: "我們應該與鄰居建立____的關係，令生活更愉快。", a: "友好", d: "答對了！友好關係讓社區更和諧。" },
        { q: "發明家要具備____精神、不怕困難及有創意的條件。", a: "探究", d: "厲害！探究精神是發明的關鍵。" },
        { q: "游泳前，我們要先做____運動才下水。", a: "熱身", d: "沒錯！熱身可以保護身體。" },
        { q: "我們在體育館做運動時，應該____場館內的設施。", a: "愛護", d: "對！公共設施需要大家愛護。" },
        { q: "把火藥用作____會危害生命。", a: "武器", d: "正確。火藥不應該用作武器。" },
        { q: "蔡倫以____作為製造紙張的原料之一。", a: "樹皮", d: "正確。蔡倫改良造紙術，用了樹皮當原料。" },
        { q: "郊遊時，我們不要擅自離隊，要注意____。", a: "安全", d: "安全第一！郊遊時要小心。" },
        { q: "魯班使用鐵片製成了____來伐木。", a: "鋸子", d: "聰明！魯班發明了鋸子。" }
    ];

    let currentIndex = 0;
    const synth = window.speechSynthesis;
    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'zh-HK';

    // 1. 修復後的按鈕綁定
    $('#start-node').on('click', function() {
        $('#intro-page').fadeOut(300, function() {
            $('#quiz-page').fadeIn(300);
            loadQuestion();
        });
    });

    function speak(text, callback) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-HK';
        utter.onend = callback;
        synth.speak(utter);
    }

    function loadQuestion() {
        if (currentIndex >= quizData.length) {
            $('#main-status').text("🏆 溫習完成！");
            $('#question-text').text("你已經掌握了所有重點。");
            speak("恭喜你，完成所有溫習內容。");
            return;
        }

        const item = quizData[currentIndex];
        $('#question-text').html(`${currentIndex+1}. ${item.q.replace("____", "<span class='blank-space'>？</span>")}`);
        
        // 朗讀題目 -> 提示準備 -> 倒數
        speak(item.q.replace("____", "什麼"), function() {
            promptAndCount();
        });
    }

    function promptAndCount() {
        $('#main-status').text("請準備作答");
        speak("請準備作答", function() {
            startCountdown(3);
        });
    }

    function startCountdown(sec) {
        let count = sec;
        $('#timer-display').text(count);
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                $('#timer-display').text(count);
            } else {
                clearInterval(timer);
                $('#timer-display').text("🎤");
                $('#main-status').text("請說話...");
                recognition.start();
            }
        }, 1000);
    }

    recognition.onresult = function(event) {
        const result = event.results[0][0].transcript;
        const item = quizData[currentIndex];

        if (result.includes(item.a)) {
            $('#main-status').text("✅ 正確").css("color", "var(--success)");
            speak(item.d, function() {
                currentIndex++;
                $('#main-status').css("color", "var(--primary)");
                loadQuestion();
            });
        } else {
            showErrorAlert();
        }
    };

    recognition.onerror = function() { showErrorAlert(); };

    // 顯眼的 3 秒錯誤補答流程
    function showErrorAlert() {
        recognition.stop();
        $('#error-overlay').css('display', 'flex');
        
        let timeLeft = 3;
        $('#retry-timer-text').text(`請準備，${timeLeft} 秒後重新補答`);

        const retryInt = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                $('#retry-timer-text').text(`請準備，${timeLeft} 秒後重新補答`);
            } else {
                clearInterval(retryInt);
                $('#error-overlay').hide();
                promptAndCount(); // 重新觸發提示作答流程
            }
        }, 1000);
    }
});
</script>
</body>
</html>
