<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常識科：語音互動溫習</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { 
            --primary: #3498db; 
            --accent: #f1c40f; 
            --danger: #e74c3c; 
            --success: #2ecc71; 
            --bg: #f8f9fa;
            --text: #2c3e50;
        }

        body, html { 
            height: 100%; margin: 0; 
            font-family: '微軟正黑體', sans-serif; 
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
        }

        .main-container {
            width: 90%; max-width: 700px;
            background: white; padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08);
            text-align: center;
            min-height: 500px;
            display: flex; flex-direction: column;
            justify-content: space-between; /* 讓內容與底部按鈕分開 */
        }

        /* 首頁設計：極簡清爽 */
        #intro-page h1 { color: var(--primary); font-size: 2.4rem; margin-top: 50px; }
        .intro-desc { font-size: 1.2rem; color: #7f8c8d; line-height: 1.8; margin-bottom: 40px; }

        /* 答題頁面：加入提示詞 */
        #quiz-page { display: none; flex-direction: column; height: 100%; }
        #main-status { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        #timer-display { font-size: 4rem; color: var(--accent); font-weight: 900; height: 80px; }
        #question-text { font-size: 1.5rem; line-height: 1.6; color: var(--text); margin: 20px 0; min-height: 80px; }
        .blank-space { color: var(--primary); border-bottom: 3px solid var(--primary); padding: 0 10px; }

        /* 提示詞庫佈局 */
        .hint-container {
            background: #f1f4f6; padding: 15px; border-radius: 15px;
            margin-bottom: 20px;
        }
        .hint-title { font-size: 0.9rem; color: #95a5a6; margin-bottom: 10px; display: block; }
        .hint-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .hint-item { 
            background: white; padding: 5px 12px; border-radius: 8px;
            font-size: 0.95rem; color: #555; border: 1px solid #ddd;
        }

        /* 按鈕樣式 */
        .btn-group { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .btn {
            border: none; padding: 15px 40px; border-radius: 50px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-primary { 
            background: var(--primary); color: white;
            box-shadow: 0 8px 15px rgba(52, 152, 219, 0.2);
        }
        .btn-outline { 
            background: transparent; color: #95a5a6; border: 2px solid #ddd;
            padding: 10px 30px; font-size: 0.9rem;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* 錯誤 Overlay */
        #error-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(231, 76, 60, 0.96); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="intro-page">
            <div>
                <h1>常識科問習遊戲</h1>
                <p class="intro-desc">
                    歡迎來到語音溫習系統。<br>
                    請聆聽問題，並在倒數結束後說出正確答案。<br>
                    準備好了嗎？
                </p>
            </div>
            <button id="btn-start" class="btn btn-primary">開始挑戰</button>
        </div>

        <div id="quiz-page">
            <div id="quiz-header">
                <div id="main-status">準備中</div>
                <div id="timer-display"></div>
                <div id="question-text">載入中...</div>
            </div>

            <div class="hint-container">
                <span class="hint-title">💡 提示詞庫：</span>
                <div class="hint-grid">
                    <div class="hint-item">生活</div><div class="hint-item">特色</div><div class="hint-item">友好</div>
                    <div class="hint-item">探究</div><div class="hint-item">熱身</div><div class="hint-item">愛護</div>
                    <div class="hint-item">武器</div><div class="hint-item">樹皮</div><div class="hint-item">安全</div>
                    <div class="hint-item">鋸子</div>
                </div>
            </div>

            <div class="btn-group">
                <button id="btn-back" class="btn btn-outline">返回首頁</button>
            </div>
        </div>
    </div>

    <div id="error-overlay">
        <h2 style="font-size: 3rem;">❌ 答錯了或收音失敗</h2>
        <p id="retry-timer-text" style="font-size: 1.5rem;">請準備，3 秒後重新補答</p>
    </div>

<script>
$(document).ready(function() {
    const quizData = [
        { q: "不同的服務人員為我們提供不同的服務，為____帶來方便。", a: "生活", d: "沒錯！生活變得更方便了。" },
        { q: "香港的社區有不同的____，例如：到沙田城門河踏單車。", a: "特色", d: "正確！每個社區都有自己的特色設施。" },
        { q: "我們應該與鄰居建立____的關係，令生活更愉快。", a: "友好", d: "答對了！友好關係非常重要。" },
        { q: "發明家要具備____精神、不怕困難及有創意的條件。", a: "探究", d: "厲害！探究精神是發明之母。" },
        { q: "游泳前，我們要先做____運動才下水。", a: "熱身", d: "正確！熱身運動可以防止抽筋。" },
        { q: "我們在體育館做運動時，應該____場館內的設施。", a: "愛護", d: "對！我們要愛護公物。" },
        { q: "把火藥用作____會危害生命。", a: "武器", d: "沒錯。科技應用於和平用途。" },
        { q: "蔡倫以____作為製造紙張的原料之一。", a: "樹皮", d: "正確。樹皮是造紙的重要發現。" },
        { q: "郊遊時，我們不要擅自離隊，要注意____。", a: "安全", d: "沒錯，安全意識最重要。" },
        { q: "魯班使用鐵片製成了____來伐木。", a: "鋸子", d: "聰明！你已經完成所有題目了。" }
    ];

    let currentIndex = 0;
    const synth = window.speechSynthesis;
    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    let recognition = new SpeechRecognition();
    recognition.lang = 'zh-HK';

    // 開始按鈕
    $('#btn-start').on('click', function() {
        $('#intro-page').hide();
        $('#quiz-page').css('display', 'flex');
        currentIndex = 0;
        loadQuestion();
    });

    // 返回按鈕
    $('#btn-back').on('click', function() {
        synth.cancel(); // 停止說話
        recognition.stop();
        $('#quiz-page').hide();
        $('#intro-page').show();
    });

    function speak(text, callback) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-HK';
        utter.onend = callback;
        synth.speak(utter);
    }

    function loadQuestion() {
        if (currentIndex >= quizData.length) {
            $('#main-status').text("🏆 溫習完成！");
            $('#question-text').text("做得太好了！你已經掌握了所有重點內容。");
            $('#timer-display').text("🌟");
            speak("恭喜你，溫習完成。");
            return;
        }

        const item = quizData[currentIndex];
        $('#question-text').html(`${currentIndex+1}. ${item.q.replace("____", "<span class='blank-space'>？</span>")}`);
        
        speak(item.q.replace("____", "什麼"), function() {
            promptAndCount();
        });
    }

    function promptAndCount() {
        $('#main-status').text("請準備作答").css("color", "var(--accent)");
        speak("請準備作答", function() {
            startCountdown(3);
        });
    }

    function startCountdown(sec) {
        let count = sec;
        $('#timer-display').text(count);
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                $('#timer-display').text(count);
            } else {
                clearInterval(timer);
                $('#timer-display').text("🎤");
                $('#main-status').text("請說話...").css("color", "var(--success)");
                recognition.start();
            }
        }, 1000);
    }

    recognition.onresult = function(event) {
        const result = event.results[0][0].transcript;
        const item = quizData[currentIndex];

        if (result.includes(item.a)) {
            $('#main-status').text("✅ 正確").css("color", "var(--success)");
            speak(item.d, function() {
                currentIndex++;
                loadQuestion();
            });
        } else {
            showErrorAlert();
        }
    };

    recognition.onerror = function() { showErrorAlert(); };

    function showErrorAlert() {
        recognition.stop();
        $('#error-overlay').css('display', 'flex');
        
        let timeLeft = 3;
        $('#retry-timer-text').text(`請準備，${timeLeft} 秒後重新補答`);

        const retryInt = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                $('#retry-timer-text').text(`請準備，${timeLeft} 秒後重新補答`);
            } else {
                clearInterval(retryInt);
                $('#error-overlay').hide();
                promptAndCount(); 
            }
        }, 1000);
    }
});
</script>
</body>
</html>
