<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板塊構造論 - 專業語音互動教學</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --danger: #c0392b; --success: #27ae60; }
        body { font-family: '微軟正黑體', sans-serif; background: #f4f7f6; margin: 0; overflow: hidden; }
        
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* 教學頁面 */
        #intro-page { max-width: 800px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .content-text { line-height: 1.8; color: #444; font-size: 1.1rem; }

        /* 問答頁面 */
        #quiz-page { display: none; width: 100%; text-align: center; }
        .q-card { background: white; padding: 40px; border-radius: 25px; display: inline-block; width: 80%; max-width: 600px; position: relative; }
        
        /* 狀態提示 */
        #main-status { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
        #timer-display { font-size: 5rem; color: var(--accent); font-weight: bold; height: 120px; }
        #question-display { font-size: 1.5rem; margin: 20px 0; min-height: 60px; color: #34495e; }
        .blank { border-bottom: 4px solid var(--accent); color: var(--accent); padding: 0 10px; font-weight: bold; }

        /* 強烈錯誤提示 Overlay */
        #error-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(192, 57, 43, 0.9); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        #error-overlay h2 { font-size: 4rem; margin: 0; }
        #error-overlay p { font-size: 2rem; }

        .btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); background: #34495e; }
    </style>
</head>
<body>

<div class="container" id="intro-page">
    <h1>🌍 板塊構造論：核心知識</h1>
    <div class="content-text">
        <p>地球的<b>岩石圈</b>是由板塊拼合而成，下方是具塑性的<b>軟流圈</b>。板塊邊界分為三類：</p>
        <ul>
            <li><b>聚合性邊界</b>：互相擠壓，形成<b>海溝</b>或褶曲山脈。</li>
            <li><b>張裂性邊界</b>：互相分離，形成<b>中洋脊</b>或裂谷。</li>
            <li><b>錯動性邊界</b>：水平滑動，發生轉形斷層。</li>
        </ul>
        <p>板塊運動的動力來自於<b>地函對流</b>。</p>
    </div>
    <button class="btn" onclick="goToQuiz()">準備好，開始測驗！</button>
</div>

<div class="container" id="quiz-page">
    <div class="q-card">
        <div id="main-status">等待中</div>
        <div id="timer-display"></div>
        <div id="question-display">載入題目中...</div>
        <div id="live-transcript" style="color: #95a5a6; font-style: italic;"></div>
    </div>
</div>

<div id="error-overlay">
    <h2>❌ 回答不正確</h2>
    <p id="retry-msg">請準備，3 秒後重新補答</p>
</div>

<script>
const quizData = [
    { q: "地球的最外層稱為____圈，是由板塊組成的。", a: "岩石", d: "岩石圈是由地殼和上地函頂部組成的剛性外殼。" },
    { q: "板塊是在哪一層構造之上進行移動的？答案是____圈。", a: "軟流", d: "軟流圈位於岩石圈下方，處於熔融狀態，方便板塊滑動。" },
    { q: "兩板塊分離，形成新地殼的邊界稱為____型邊界。", a: "張裂", d: "沒錯，中洋脊就是典型的張裂型邊界。" },
    { q: "板塊移動的主要原因是因為地函產生的____現象。", a: "對流", d: "地函對流產生的熱能推動了上方板塊的運動。" },
    { q: "法國學者勒皮雄在1968年將全球劃分為____大板塊。", a: "六", d: "這六大板塊包括歐亞、非洲、美洲、太平洋、印度洋及南極洲板塊。" }
];

let currentIndex = 0;
const synth = window.speechSynthesis;
const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = 'zh-HK'; 
recognition.interimResults = false;

function speak(text, callback) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-HK';
    utter.rate = 1.0;
    utter.onend = callback;
    synth.speak(utter);
}

function goToQuiz() {
    $('#intro-page').hide();
    $('#quiz-page').css('display', 'flex');
    loadQuestion();
}

function loadQuestion() {
    if (currentIndex >= quizData.length) {
        $('#main-status').text("🏆 挑戰完成！");
        $('#question-display').text("你已經掌握了板塊構造論的重點。");
        speak("恭喜你完成所有題目！");
        return;
    }

    const item = quizData[currentIndex];
    $('#question-display').html(item.q.replace("____", "<span class='blank'>？</span>"));
    $('#live-transcript').text("");
    
    // 先讀出題目
    speak(item.q.replace("____", "什麼"), function() {
        prepareToAnswer();
    });
}

// 核心流程：提示 -> 倒數 -> 錄音
function prepareToAnswer() {
    $('#main-status').text("請準備作答");
    speak("請準備作答", function() {
        startCountdown(3);
    });
}

function startCountdown(seconds) {
    let count = seconds;
    $('#timer-display').text(count);
    
    const interval = setInterval(() => {
        count--;
        if (count > 0) {
            $('#timer-display').text(count);
        } else {
            clearInterval(interval);
            $('#timer-display').text("🎤");
            $('#main-status').text("請說話...");
            recognition.start();
        }
    }, 1000);
}

// 語音識別結果
recognition.onresult = function(event) {
    const userAnswer = event.results[0][0].transcript;
    const item = quizData[currentIndex];
    $('#live-transcript').text("你說的是：" + userAnswer);

    if (userAnswer.includes(item.a)) {
        // 答對邏輯
        $('#main-status').text("✅ 正確！").css("color", "var(--success)");
        speak(item.d, function() {
            currentIndex++;
            $('#main-status').css("color", "var(--primary)");
            setTimeout(loadQuestion, 500);
        });
    } else {
        triggerError();
    }
};

recognition.onerror = function() {
    triggerError();
};

// 錯誤處理：顯示顯眼的 Alert 並倒數 3 秒補答
function triggerError() {
    recognition.stop();
    $('#error-overlay').css('display', 'flex').fadeOut(100).fadeIn(100); // 閃爍效果
    
    let retryCount = 3;
    const retryInterval = setInterval(() => {
        retryCount--;
        if (retryCount > 0) {
            $('#retry-msg').text(`請準備，${retryCount} 秒後重新補答`);
        } else {
            clearInterval(retryInterval);
            $('#error-overlay').hide();
            $('#retry-msg').text(`請準備，3 秒後重新補答`); // 重置文字
            prepareToAnswer(); // 重新進入準備作答流程
        }
    }, 1000);
}
</script>

</body>
</html>
