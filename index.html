<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中國奇觀探索之旅 - 完整版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', ui-sans-serif, system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #f5f5f4;
            overflow-x: hidden;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        ::-webkit-scrollbar { display: none; }
        .map-bg {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom": "https://esm.sh/react-dom@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client",
        "motion/react": "https://esm.sh/framer-motion@11",
        "lucide-react": "https://esm.sh/lucide-react",
        "canvas-confetti": "https://esm.sh/canvas-confetti",
        "clsx": "https://esm.sh/clsx",
        "tailwind-merge": "https://esm.sh/tailwind-merge"
      }
    }
    </script>

    <script type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'motion/react';
        import * as Lucide from 'lucide-react';
        import confetti from 'canvas-confetti';
        import { clsx } from 'clsx';
        import { twMerge } from 'tailwind-merge';

        // --- 完整資料庫 (來自你提供的 data.ts) ---
        const LANDMARKS = [
            {
                id: 'great-wall',
                name: '萬里長城 (The Great Wall)',
                type: 'Man-made',
                measurement: '21,196 km 長',
                questionType: 'length',
                prideFact: '統一與歷史的象徵',
                typeHint: '由成千上萬的工人使用石頭和磚塊建造。',
                icon: 'Castle',
                color: 'bg-orange-400',
                x: 75, y: 25,
                image: 'https://images.unsplash.com/photo-1508804185872-d7badad00f7d?auto=format&fit=crop&w=1200&q=80'
            },
            {
                id: 'yangtze-river',
                name: '長江 (The Yangtze River)',
                type: 'Natural',
                measurement: '6,300 km 長',
                questionType: 'length',
                prideFact: '中國的母親河',
                typeHint: '自然形成的水之奇觀。',
                icon: 'Waves',
                color: 'bg-blue-400',
                x: 40, y: 60,
                image: 'https://images.unsplash.com/photo-1543333995-a78ee96b9201?auto=format&fit=crop&w=1200&q=80'
            },
            {
                id: 'oriental-pearl',
                name: '東方明珠塔',
                type: 'Man-made',
                measurement: '468 m 高',
                questionType: 'height',
                prideFact: '上海享譽世界的電視塔',
                typeHint: '工程師設計並使用鋼鐵與玻璃建造。',
                icon: 'Building2',
                color: 'bg-indigo-400',
                x: 80, y: 50,
                image: 'https://www.visitourchina.com/FileUpload/newpicture/cities/shanghai/dongfangmingzhu1.jpg'
            },
            {
                id: 'leshan-buddha',
                name: '樂山大佛',
                type: 'Man-made',
                measurement: '71 m 高',
                questionType: 'height',
                prideFact: '古代藝術的驚人傑作',
                typeHint: '古代工匠在一千多年前直接在石壁上雕刻而成。',
                icon: 'User',
                color: 'bg-emerald-400',
                x: 55, y: 35,
                image: 'https://chinaexplorertour.com/wp-content/uploads/2025/12/e3ae1b1e2b89450696f8d35a879b369e.jpg'
            },
            {
                id: 'hzm-bridge',
                name: '港珠澳大橋',
                type: 'Man-made',
                measurement: '55 km 長',
                questionType: 'length',
                prideFact: '連接香港、珠海、澳門的奇蹟',
                typeHint: '現代工程技術建造的超長跨海大橋。',
                icon: 'Waypoints',
                color: 'bg-cyan-500',
                x: 72, y: 82,
                image: 'https://images.unsplash.com/photo-1590402444521-4a30e8c3f4a0?auto=format&fit=crop&w=1200&q=80'
            }
        ];

        // 圖標對照
        const IconMap = {
            Castle: Lucide.Castle,
            Waves: Lucide.Waves,
            Building2: Lucide.Building2,
            User: Lucide.User,
            Waypoints: Lucide.Waypoints,
            Globe: Lucide.Globe,
            Trophy: Lucide.Trophy
        };

        function App() {
            const [gameState, setGameState] = useState('start');
            const [selected, setSelected] = useState(null);

            const playSound = () => {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <AnimatePresence mode="wait">
                        {gameState === 'start' && (
                            <motion.div key="1" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="text-center">
                                <Lucide.Globe className="w-20 h-20 mx-auto text-orange-500 mb-6 animate-float" />
                                <h1 className="text-5xl font-black text-stone-800 mb-4">中國奇觀探索</h1>
                                <button onClick={() => setGameState('map')} className="bg-orange-500 text-white px-10 py-4 rounded-full text-xl font-bold shadow-lg hover:scale-105 transition-transform">
                                    立即開始
                                </button>
                            </motion.div>
                        )}

                        {gameState === 'map' && (
                            <motion.div key="2" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="w-full max-w-5xl">
                                <div className="relative aspect-video bg-white rounded-3xl shadow-2xl map-bg border-8 border-white overflow-hidden">
                                    {LANDMARKS.map(l => {
                                        const Icon = IconMap[l.icon] || Lucide.MapPin;
                                        return (
                                            <button 
                                                key={l.id}
                                                style={{ left: `${l.x}%`, top: `${l.y}%` }}
                                                className={`absolute p-3 rounded-full text-white shadow-xl ${l.color} hover:scale-125 transition-transform`}
                                                onClick={() => { setSelected(l); setGameState('detail'); confetti(); }}
                                            >
                                                <Icon size={24} />
                                            </button>
                                        );
                                    })}
                                </div>
                            </motion.div>
                        )}

                        {gameState === 'detail' && selected && (
                            <motion.div key="3" initial={{ y: 50, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="bg-white rounded-3xl shadow-2xl max-w-4xl overflow-hidden flex flex-col md:flex-row">
                                <img src={selected.image} className="md:w-1/2 h-64 md:h-auto object-cover" />
                                <div className="p-8 md:w-1/2">
                                    <h2 className="text-4xl font-black mb-2">{selected.name}</h2>
                                    <p className="text-2xl font-bold text-orange-500 mb-4">{selected.measurement}</p>
                                    <p className="text-stone-600 mb-6 bg-stone-100 p-4 rounded-xl border-l-4 border-orange-400 italic">"{selected.typeHint}"</p>
                                    <div className="flex items-center gap-2 mb-8 text-stone-800 font-bold">
                                        <Lucide.Trophy className="text-yellow-500" /> {selected.prideFact}
                                    </div>
                                    <button onClick={() => setGameState('map')} className="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">返回地圖</button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
