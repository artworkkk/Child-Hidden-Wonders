<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常識科：智力大挑戰</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { 
            --primary: #0984e3; 
            --primary-light: #74b9ff; 
            --accent: #fdcb6e; 
            --danger: #ff7675; 
            --danger-dark: #d63031;
            --success: #00b894; 
            --success-dark: #009476;
            --text-main: #2d3436;
            --bg-color: #f0f9ff;
        }

        body, html { 
            height: 100%; margin: 0; 
            font-family: '微軟正黑體', 'Microsoft JhengHei', sans-serif; 
            /* 活潑的波點背景 */
            background-color: var(--bg-color);
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
            display: flex; justify-content: center; align-items: center;
        }

        .main-container {
            width: 95%; max-width: 800px;
            background: #ffffff;
            padding: 35px; 
            border-radius: 35px;
            /* 遊戲卡片立體陰影 */
            box-shadow: 0 15px 35px rgba(9, 132, 227, 0.15), 0 5px 15px rgba(0,0,0,0.05);
            border: 6px solid #ffffff;
            text-align: center;
            min-height: 580px;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* 遊戲化進度條 */
        .progress-container { 
            width: 100%; height: 16px; 
            background: #ecf0f1; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        #progress-bar { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--primary-light), var(--primary)); 
            border-radius: 20px; 
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* 首頁設計 */
        #intro-page { display: flex; flex-direction: column; align-items: center; }
        .mascot { font-size: 5.5rem; animation: bounce 2s infinite; margin-bottom: 10px; }
        #intro-page h1 { 
            color: var(--primary); font-size: 2.8rem; margin-top: 0;
            text-shadow: 3px 3px 0px #dfe6e9; 
        }
        .intro-card { 
            background: #fdfbf7; padding: 25px; border-radius: 20px; 
            border: 2px dashed #b2bec3; margin-bottom: 35px; width: 80%;
        }
        .intro-card p { font-size: 1.2rem; color: #636e72; line-height: 1.6; margin: 0; }

        /* 答題頁面 */
        #quiz-page { display: none; flex-direction: column; flex-grow: 1; }
        #main-status { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        #timer-display { 
            font-size: 5.5rem; font-weight: 900; height: 110px; 
            display: flex; align-items: center; justify-content: center; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        #question-box { 
            background: #f8fbff; padding: 30px 25px; border-radius: 25px; 
            border: 3px solid var(--primary-light); 
            box-shadow: 0 8px 20px rgba(116, 185, 255, 0.15);
            margin: 15px 0 25px 0; min-height: 100px; 
            display: flex; align-items: center; justify-content: center; 
        }
        #question-text { font-size: 1.7rem; color: var(--text-main); line-height: 1.6; font-weight: bold; }
        
        /* 填空處樣式 */
        .blank-space { 
            color: var(--primary); 
            border-bottom: 4px dashed var(--primary); 
            padding: 0 15px; margin: 0 5px;
            font-weight: 900; min-width: 70px; display: inline-block; 
            text-align: center;
        }

        /* 詞語庫 (Hint) */
        .hint-section { margin-top: auto; padding: 20px; background: #fff; border-radius: 25px; border: 2px solid #ecf0f1; }
        .hint-title { text-align: left; font-size: 1.1rem; font-weight: bold; color: #a4b0be; margin-bottom: 12px; }
        .hint-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .hint-item { 
            background: #fff; padding: 12px 5px; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; color: var(--primary); 
            border: 2px solid var(--primary-light); 
            box-shadow: 0 4px 0 var(--primary-light); /* 按鈕立體感 */
        }

        /* 遊戲按鈕設計 */
        .btn { font-family: inherit; font-weight: 900; cursor: pointer; transition: all 0.1s; }
        .btn-start { 
            background: var(--success); color: white; font-size: 1.5rem; 
            padding: 18px 50px; border-radius: 50px; border: none;
            box-shadow: 0 6px 0 var(--success-dark), 0 15px 20px rgba(0,0,0,0.15);
        }
        .btn-start:active { transform: translateY(6px); box-shadow: 0 0 0 var(--success-dark); }
        
        .btn-exit { 
            background: #dfe6e9; color: #636e72; font-size: 1rem; 
            padding: 12px 30px; margin-top: 25px; border-radius: 50px; 
            border: none; align-self: center; box-shadow: 0 4px 0 #b2bec3;
        }
        .btn-exit:active { transform: translateY(4px); box-shadow: 0 0 0 #b2bec3; }

        /* 動畫效果 */
        @keyframes bounce { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }
        .recording-icon { animation: pulse 1s infinite; }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.15); } 
            100% { transform: scale(1); } 
        }

        /* 錯誤 Modal Overlay */
        #error-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 52, 54, 0.7); backdrop-filter: blur(5px); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .error-modal {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 5px solid var(--danger);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-width: 80%;
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #error-title { color: var(--danger); font-size: 2.5rem; margin-top: 0; }
        #retry-timer-text { font-size: 1.3rem; color: #636e72; font-weight: bold; margin-bottom: 0; }
        
    </style>
</head>
<body>

    <div class="main-container">
        <div class="progress-container"><div id="progress-bar"></div></div>

        <div id="intro-page">
            <div class="mascot">🦉</div>
            <h1>常識科大挑戰</h1>
            <div class="intro-card">
                <p>請聆聽題目，然後對準麥克風說出答案。<br><b>連續答錯 3 次</b>會自動顯示答案並跳題喔！</p>
            </div>
            <button id="btn-start" class="btn btn-start">▶️ 立即開始</button>
        </div>

        <div id="quiz-page">
            <div id="main-status">準備就緒</div>
            <div id="timer-display">🎧</div>
            <div id="question-box"><div id="question-text">載入中...</div></div>
            <div class="hint-section">
                <div class="hint-title">💡 詞語庫 (請從以下選出答案)</div>
                <div id="hint-grid" class="hint-grid"></div>
            </div>
            <button id="btn-exit" class="btn btn-exit">🚪 退出結束</button>
        </div>
    </div>

    <!-- 錯誤提示彈窗 -->
    <div id="error-overlay">
        <div class="error-modal">
            <h2 id="error-title">❌ 答錯了</h2>
            <p id="retry-timer-text">請準備，3 秒後重新補答</p>
        </div>
    </div>

<script>
$(document).ready(function() {
    const originalQuiz =[
        { q: "不同的服務人員為我們提供不同的服務，為____帶來方便。", a: "生活", d: "沒錯！生活更便利了。" },
        { q: "香港的社區有不同的____，例如：到沙田城門河踏單車。", a: "特色", d: "正確！社區特色讓環境更精彩。" },
        { q: "我們應該與鄰居建立____的關係，令生活更愉快。", a: "友好", d: "答對了！友好關係很重要。" },
        { q: "發明家要具備____精神、不怕困難及有創意的條件。", a: "探究", d: "厲害！探究精神是發明的開始。" },
        { q: "游泳前，我們要先做____運動才下水。", a: "熱身", d: "正確！熱身可以保護身體。" },
        { q: "我們在體育館做運動時，應該____場館內的設施。", a: "愛護", d: "對！愛護公物是好行為。" },
        { q: "把火藥用作____會危害生命。", a: "武器", d: "沒錯。科技不應用於製造武器。" },
        { q: "蔡倫以____作為製造紙張的原料之一。", a: "樹皮", d: "正確。蔡倫改良了造紙術。" },
        { q: "郊遊時，我們不要擅自離隊，要注意____。", a: "安全", d: "沒錯，安全第一。" },
        { q: "魯班使用鐵片製成了____來伐木。", a: "鋸子", d: "聰明！你完成了這道題！" }
    ];

    let currentQuestions =[];
    let currentIndex = 0;
    let errorCount = 0; 
    let silenceTimer;
    
    // 語音設定
    const synth = window.speechSynthesis;
    let femaleVoice = null;

    // 獲取並篩選女聲
    function initVoice() {
        let voices = synth.getVoices();
        if (voices.length > 0) {
            // 優先尋找香港女聲 (Sin-ji, Tracy, Google粵語)
            femaleVoice = voices.find(v => v.lang === 'zh-HK' && (v.name.includes('Sin-ji') || v.name.includes('Tracy') || v.name.includes('Google') || v.name.toLowerCase().includes('female'))) ||
                          voices.find(v => v.lang === 'zh-HK');
        }
    }
    initVoice();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = initVoice;
    }

    // 檢查瀏覽器是否支援語音辨識
    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    let recognition;
    if (!SpeechRecognition) {
        alert("⚠️ 你的瀏覽器不支援語音辨識，請使用 Google Chrome 瀏覽器。");
    } else {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-HK';
    }

    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function updateHintGrid() {
        const answers = originalQuiz.map(item => item.a);
        const shuffledHints = shuffle(answers);
        $('#hint-grid').empty();
        shuffledHints.forEach(word => {
            $('#hint-grid').append(`<div class="hint-item">${word}</div>`);
        });
    }

    $('#btn-start').on('click', function() {
        if (!recognition) return;
        currentQuestions = shuffle(originalQuiz);
        updateHintGrid();
        currentIndex = 0;
        $('#intro-page').fadeOut(300, function() {
            $('#quiz-page').css('display', 'flex').hide().fadeIn();
            loadQuestion();
        });
    });

    $('#btn-exit').on('click', function() { resetApp(); });

    function resetApp() {
        clearTimeout(silenceTimer);
        synth.cancel();
        if(recognition) recognition.stop();
        $('#quiz-page').hide();
        $('#intro-page').show();
        $('#progress-bar').css('width', '0%');
    }

    // 發音優化 (女聲 + 調整語氣)
    function speak(text, callback) {
        const utter = new SpeechSynthesisUtterance(text);
        if (femaleVoice) utter.voice = femaleVoice;
        else utter.lang = 'zh-HK';
        
        utter.pitch = 1.15; // 稍微提高音調讓聲音更溫柔
        utter.rate = 0.95;  // 放慢一點語速讓學生聽清楚
        
        if(callback) utter.onend = callback;
        synth.speak(utter);
    }

    function loadQuestion() {
        if (currentIndex >= currentQuestions.length) {
            finishQuiz();
            return;
        }

        errorCount = 0; 
        const progress = (currentIndex / currentQuestions.length) * 100;
        $('#progress-bar').css('width', progress + '%');

        const item = currentQuestions[currentIndex];
        $('#question-text').html(`${currentIndex + 1}. ${item.q.replace("____", "<span class='blank-space'>？</span>")}`);
        $('#main-status').html("🔊 <span style='color:var(--primary)'>請聆聽題目</span>");
        $('#timer-display').text("🎧");

        // 發音時將 ____ 替換為 "什麼" 以符合語境
        speak(item.q.replace("____", "什麼"), function() {
            promptAndCount();
        });
    }

    function promptAndCount() {
        $('#main-status').html("⏳ <span style='color:var(--accent)'>準備作答</span>");
        speak("請準備作答", function() {
            $('#timer-display').text("1");
            setTimeout(() => { startRecording(); }, 1000);
        });
    }

    function startRecording() {
        $('#timer-display').html("<div class='recording-icon'>🎙️</div>");
        $('#main-status').html("🟢 <span style='color:var(--success)'>請對麥克風說話...</span>");
        try { recognition.start(); } catch(e) {}

        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            recognition.stop();
            handleError("⌛ 偵測不到聲音");
        }, 10000);
    }

    if(recognition) {
        recognition.onresult = function(event) {
            clearTimeout(silenceTimer);
            const result = event.results[0][0].transcript;
            const item = currentQuestions[currentIndex];

            if (result.includes(item.a)) {
                handleSuccess(item);
            } else {
                handleError("❌ 答案不正確");
            }
        };

        recognition.onerror = function() {
            clearTimeout(silenceTimer);
            handleError("⚠️ 收音失敗");
        };
    }

    function handleSuccess(item) {
        $('#main-status').html("✅ <span style='color:var(--success)'>答對了！</span>");
        $('.blank-space').text(item.a).css({"color": "var(--success)", "border-color": "var(--success)"});
        speak(item.d, function() {
            currentIndex++;
            setTimeout(loadQuestion, 1000);
        });
    }

    function handleError(title) {
        errorCount++; 
        
        if (errorCount >= 3) {
            const item = currentQuestions[currentIndex];
            $('#main-status').html("⚠️ <span style='color:var(--danger)'>請留意答案</span>");
            $('.blank-space').text(item.a).css({"color": "var(--accent)", "border-color": "var(--accent)"});
            
            speak("不要緊，正確答案是 " + item.a + "。" + item.d, function() {
                currentIndex++;
                setTimeout(loadQuestion, 1500);
            });
        } else {
            showErrorOverlay(title);
        }
    }

    function showErrorOverlay(title) {
        $('#error-title').text(title);
        $('#error-overlay').css('display', 'flex').hide().fadeIn(200);
        
        let retryCount = 3;
        const timer = setInterval(() => {
            retryCount--;
            if (retryCount > 0) {
                $('#retry-timer-text').text(`請準備，${retryCount} 秒後重新補答 (第 ${errorCount}/3 次)`);
            } else {
                clearInterval(timer);
                $('#error-overlay').fadeOut(200);
                promptAndCount();
            }
        }, 1000);
    }

    function finishQuiz() {
        $('#progress-bar').css('width', '100%');
        $('#main-status').html("🏆 <span style='color:var(--success)'>溫習完成</span>");
        $('#timer-display').html("<div class='mascot' style='animation:none'>🎉</div>");
        $('#question-text').text("你已經完成所有隨機練習！表現出色！");
        speak("恭喜你，溫習完成！再接再厲！");
    }
});
</script>
</body>
</html>
